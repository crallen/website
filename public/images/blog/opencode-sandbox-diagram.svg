<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="940" version="1.1" viewBox="0,0,1600,940" width="1600" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrow" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#5C7A5E" /></marker><marker id="arrowMuted" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><path d="M 0 0 L 10 5 L 0 10 z" fill="#E0D9D2" /></marker></defs><rect fill="#F5F0EB" height="940" width="1600" x="0" y="0" /><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="40" font-weight="700" text-anchor="middle" x="800.0" y="78">opencode-sandbox</text><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="400" text-anchor="middle" x="800.0" y="116">Explicit context, hard filesystem boundaries, and a specialist agent team</text><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="start" x="84" y="168">Host machine</text><line stroke="#E0D9D2" stroke-width="2" x1="84" x2="240" y1="178" y2="178" /><rect fill="#000" height="96" opacity="0.05" rx="18" ry="18" width="340" x="84" y="210" /><rect fill="#FAFAF8" height="96" rx="18" ry="18" stroke="#E0D9D2" stroke-width="2" width="340" x="84" y="204" /><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start" x="108" y="240">Project folder</text><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start" x="108" y="274">Mounted read-write at /workspace</text><rect fill="#EEF4EE" height="30" rx="15.0" ry="15.0" stroke="#C9D8CA" stroke-width="1.5" width="56" x="338" y="224" /><text fill="#5C7A5E" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle" x="366.0" y="243.8">RW</text><rect fill="#000" height="96" opacity="0.05" rx="18" ry="18" width="340" x="84" y="330" /><rect fill="#FAFAF8" height="96" rx="18" ry="18" stroke="#E0D9D2" stroke-width="2" width="340" x="84" y="324" /><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start" x="108" y="360">Reference repos / docs</text><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start" x="108" y="394">Mounted read-only under /reference/*</text><rect fill="#F1F4F1" height="30" rx="15.0" ry="15.0" stroke="#E0D9D2" stroke-width="1.5" width="56" x="338" y="344" /><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle" x="366.0" y="363.8">RO</text><rect fill="#000" height="96" opacity="0.05" rx="18" ry="18" width="340" x="84" y="450" /><rect fill="#FAFAF8" height="96" rx="18" ry="18" stroke="#E0D9D2" stroke-width="2" width="340" x="84" y="444" /><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start" x="108" y="480">API keys</text><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start" x="108" y="514">Passed via temporary env-file</text><rect fill="#000" height="96" opacity="0.05" rx="18" ry="18" width="340" x="84" y="570" /><rect fill="#FAFAF8" height="96" rx="18" ry="18" stroke="#E0D9D2" stroke-width="2" width="340" x="84" y="564" /><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start" x="108" y="600">SSH agent</text><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start" x="108" y="634">Forwarded instead of mounting private keys</text><rect fill="#000" height="540" opacity="0.05" rx="26" ry="26" width="996" x="520" y="176" /><rect fill="#FBF8F4" height="540" rx="26" ry="26" stroke="#5C7A5E" stroke-width="3" width="996" x="520" y="170" /><text fill="#5C7A5E" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start" x="548" y="208">Docker container boundary</text><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start" x="548" y="240">Only mounted paths are visible to the agent</text><rect fill="#EEF4EE" height="34" rx="17.0" ry="17.0" stroke="#C9D8CA" stroke-width="1.5" width="260" x="1210" y="192" /><text fill="#5C7A5E" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle" x="1340.0" y="214.44">hard boundary, not policy</text><rect fill="#FFFFFF" height="116" rx="18" ry="18" stroke="#C9D8CA" stroke-width="2" width="260" x="560" y="246" /><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start" x="580" y="284">/workspace</text><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start" x="580" y="318"><tspan dy="0" x="580">Writable project</tspan><tspan dy="24.3" x="580">context</tspan></text><rect fill="#EEF4EE" height="28" rx="14.0" ry="14.0" stroke="#C9D8CA" stroke-width="1.5" width="56" x="744" y="268" /><text fill="#5C7A5E" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" x="772.0" y="286.48">RW</text><rect fill="#FFFFFF" height="104" rx="18" ry="18" stroke="#E0D9D2" stroke-width="2" width="260" x="560" y="388" /><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start" x="580" y="426">/reference/*</text><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start" x="580" y="458"><tspan dy="0" x="580">Read-only extra</tspan><tspan dy="24.3" x="580">context</tspan></text><rect fill="#F1F4F1" height="28" rx="14.0" ry="14.0" stroke="#E0D9D2" stroke-width="1.5" width="56" x="744" y="410" /><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle" x="772.0" y="428.48">RO</text><rect fill="#F3ECE7" height="112" rx="18" ry="18" stroke="#D8C7BC" stroke-width="2" width="260" x="560" y="518" /><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="start" x="580" y="556">.env files</text><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start" x="580" y="588"><tspan dy="0" x="580">Explicitly blocked</tspan><tspan dy="24.3" x="580">from agent reads</tspan></text><rect fill="#F5F0EB" height="28" rx="14.0" ry="14.0" stroke="#D8C7BC" stroke-width="1.5" width="76" x="724" y="540" /><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="762.0" y="558.48">blocked</text><rect fill="#FFFFFF" height="308" rx="18" ry="18" stroke="#C9D8CA" stroke-width="2" width="620" x="860" y="246" /><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="start" x="884" y="284">Architect + specialist agents</text><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start" x="884" y="314">Planning, delegation, and scoped capabilities</text><rect fill="#EEF4EE" height="40" rx="20.0" ry="20.0" stroke="#E0D9D2" stroke-width="1.5" width="172" x="884" y="346" /><text fill="#5C7A5E" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" x="970.0" y="372.4">reviewer</text><rect fill="#EEF4EE" height="40" rx="20.0" ry="20.0" stroke="#E0D9D2" stroke-width="1.5" width="172" x="1072" y="346" /><text fill="#5C7A5E" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" x="1158.0" y="372.4">security</text><rect fill="#F7F4F1" height="40" rx="20.0" ry="20.0" stroke="#E0D9D2" stroke-width="1.5" width="172" x="1260" y="346" /><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" x="1346.0" y="372.4">tester</text><rect fill="#F7F4F1" height="40" rx="20.0" ry="20.0" stroke="#E0D9D2" stroke-width="1.5" width="172" x="884" y="400" /><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" x="970.0" y="426.4">debugger</text><rect fill="#F7F4F1" height="40" rx="20.0" ry="20.0" stroke="#E0D9D2" stroke-width="1.5" width="172" x="1072" y="400" /><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" x="1158.0" y="426.4">documenter</text><rect fill="#F7F4F1" height="40" rx="20.0" ry="20.0" stroke="#E0D9D2" stroke-width="1.5" width="172" x="1260" y="400" /><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" x="1346.0" y="426.4">devops</text><rect fill="#F7F4F1" height="40" rx="20.0" ry="20.0" stroke="#E0D9D2" stroke-width="1.5" width="172" x="884" y="454" /><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" x="970.0" y="480.4">git</text><rect fill="#F7F4F1" height="40" rx="20.0" ry="20.0" stroke="#E0D9D2" stroke-width="1.5" width="172" x="1072" y="454" /><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" x="1158.0" y="480.4">frontend</text><rect fill="#EEF4EE" height="40" rx="20.0" ry="20.0" stroke="#E0D9D2" stroke-width="1.5" width="172" x="1260" y="454" /><text fill="#5C7A5E" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle" x="1346.0" y="480.4">agent builder</text><rect fill="#FAFAF8" height="44" rx="12" ry="12" stroke="#E0D9D2" stroke-width="2" width="572" x="884" y="492" /><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start" x="904" y="521">Not every agent can write, execute, or commit</text><rect fill="#FFFFFF" height="108" rx="18" ry="18" stroke="#E0D9D2" stroke-width="2" width="620" x="860" y="580" /><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="start" x="884" y="618">On-demand skills + slash commands</text><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start" x="884" y="650">Load skills only when needed to keep the base context lean</text><rect fill="#FAFAF8" height="28" rx="14.0" ry="14.0" stroke="#E0D9D2" stroke-width="1.5" width="450" x="884" y="658" /><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" x="1109.0" y="676.48">/review   /security   /test   /debug</text><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" x="1018" y="754">Persistent volumes</text><line stroke="#E0D9D2" stroke-width="2" x1="916" x2="1120" y1="764" y2="764" /><rect fill="#000" height="88" opacity="0.05" rx="20" ry="20" width="220" x="650" y="798" /><rect fill="#FAFAF8" height="88" rx="20" ry="20" stroke="#E0D9D2" stroke-width="2" width="220" x="650" y="792" /><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" x="760" y="828">opencode-data</text><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="400" text-anchor="middle" x="760" y="858">session data</text><rect fill="#000" height="88" opacity="0.05" rx="20" ry="20" width="220" x="940" y="798" /><rect fill="#FAFAF8" height="88" rx="20" ry="20" stroke="#E0D9D2" stroke-width="2" width="220" x="940" y="792" /><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" x="1050" y="828">opencode-state</text><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="400" text-anchor="middle" x="1050" y="858">theme + model prefs</text><rect fill="#000" height="88" opacity="0.05" rx="20" ry="20" width="220" x="1230" y="798" /><rect fill="#FAFAF8" height="88" rx="20" ry="20" stroke="#E0D9D2" stroke-width="2" width="220" x="1230" y="792" /><text fill="#2D2A26" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" x="1340" y="828">opencode-config</text><text fill="#6B6560" font-family="DejaVu Sans, Arial, sans-serif" font-size="17" font-weight="400" text-anchor="middle" x="1340" y="858">config files</text><line marker-end="url(#arrow)" stroke="#5C7A5E" stroke-width="4" x1="424" x2="542" y1="252" y2="258" /><line marker-end="url(#arrow)" stroke="#5C7A5E" stroke-width="4" x1="424" x2="542" y1="372" y2="396" /><line marker-end="url(#arrow)" stroke="#5C7A5E" stroke-width="4" x1="424" x2="540" y1="492" y2="596" /><line marker-end="url(#arrow)" stroke="#5C7A5E" stroke-width="4" x1="424" x2="540" y1="612" y2="636" /><line marker-end="url(#arrowMuted)" stroke="#E0D9D2" stroke-width="3" x1="760" x2="760" y1="792" y2="710" /><line marker-end="url(#arrowMuted)" stroke="#E0D9D2" stroke-width="3" x1="1050" x2="1050" y1="792" y2="710" /><line marker-end="url(#arrowMuted)" stroke="#E0D9D2" stroke-width="3" x1="1340" x2="1340" y1="792" y2="710" /><text fill="#5C7A5E" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle" x="1270" y="132">Result: the AI only sees</text><text fill="#5C7A5E" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle" x="1270" y="158">what you choose to expose</text></svg>